<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RunnerPro - Foco no Percurso</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --bg-app: #f4f4f9;
            --bg-card: #ffffff;
            --text-main: #2d2d3a;
            --text-dim: #8e8e93;
            --accent-purple: #673ab7;
            --accent-purple-dim: #ede7f6;
            --danger: #ff3b30;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { background-color: var(--bg-app); color: var(--text-main); overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

        /* Estrutura de Abas */
        .app-shell { flex: 1; overflow-y: auto; padding-bottom: 80px; display: none; }
        .app-shell.active { display: block; }

        header { 
            background: var(--bg-card); padding: 15px 20px; 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100;
        }
        header h1 { font-size: 1.4rem; font-weight: 800; color: var(--accent-purple); }

        .card { background: var(--bg-card); border-radius: 20px; padding: 20px; margin: 0 15px 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        
        /* Stats Summary */
        .stats-summary { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; text-align: center; }
        .stat-group .label { font-size: 0.8rem; color: var(--text-dim); font-weight: 600; margin-bottom: 3px; display: block; }
        .stat-group .value { font-size: 1.8rem; font-weight: 800; }
        .stat-group .unit { font-size: 1rem; font-weight: 600; }

        /* Lista de Atividades */
        .activity-item { 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 15px 0; border-bottom: 1px solid #eee; cursor: pointer;
        }
        .activity-icon { 
            width: 45px; height: 45px; background: var(--accent-purple-dim); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            color: var(--accent-purple); margin-right: 12px;
        }
        .activity-info { flex: 1; }
        .activity-type { font-weight: 700; }
        .activity-date { font-size: 0.75rem; color: var(--text-dim); }

        /* Botões */
        .btn-purple { 
            background: var(--accent-purple); color: white; border: none; 
            padding: 16px; border-radius: 30px; font-weight: 700; 
            width: calc(100% - 30px); margin: 10px 15px; cursor: pointer;
        }

        #map-running { height: 350px; width: calc(100% - 30px); margin: 0 15px 15px; border-radius: 20px; z-index: 1; }

        /* Navegação Inferior */
        .nav-bottom { 
            position: fixed; bottom: 0; width: 100%; height: 70px; 
            background: var(--bg-card); border-top: 1px solid #eee; 
            display: flex; justify-content: space-around; align-items: center;
        }
        .nav-item { text-align: center; color: var(--text-dim); flex: 1; cursor: pointer; }
        .nav-item.active { color: var(--accent-purple); }
        .nav-label { font-size: 0.7rem; font-weight: 600; margin-top: 2px; }

        /* Modal Share */
        #shareModal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 2000; display: none; 
            align-items: center; justify-content: center;
        }
        #shareModal.active { display: flex; }
        .share-card { background: var(--bg-card); width: 85%; border-radius: 20px; overflow: hidden; }
        .share-map { height: 200px; width: 100%; background: #ddd; }
        .share-content { padding: 20px; }
    </style>
</head>
<body>

    <div id="shell-diary" class="app-shell active">
        <header><h1>Diário</h1></header>
        <div class="card">
            <div class="stats-summary">
                <div class="stat-group"><span class="label">Distância Total</span><span class="value" id="total-dist">0.0</span> <span class="unit">km</span></div>
                <div class="stat-group"><span class="label">Atividades</span><span class="value" id="total-acts">0</span></div>
            </div>
        </div>
        <div class="card" id="activity-list">
            <p style="text-align:center; color:gray;">Nenhuma atividade recente.</p>
        </div>
        <button class="btn-purple" onclick="switchTab('shell-run')">Nova Atividade</button>
    </div>

    <div id="shell-run" class="app-shell">
        <header><h1>Correr</h1><span id="gps-status" style="font-size:0.7rem;">BUSCANDO GPS...</span></header>
        <div class="card" style="background: var(--accent-purple); color: white;">
            <div class="stats-summary">
                <div class="stat-group"><span class="label" style="color:rgba(255,255,255,0.7)">Distância</span><span class="value" id="run-dist">0.00</span> <span class="unit">km</span></div>
                <div class="stat-group"><span class="label" style="color:rgba(255,255,255,0.7)">Tempo</span><span class="value" id="run-time">00:00:00</span></div>
            </div>
        </div>
        <div id="map-running"></div>
        <button id="mainBtn" class="btn-purple" onclick="handleRunAction()">Iniciar Corrida</button>
    </div>

    <nav class="nav-bottom">
        <div class="nav-item" onclick="switchTab('shell-run')"><div>➕</div><div class="nav-label">Correr</div></div>
        <div class="nav-item active" onclick="switchTab('shell-diary')"><div>📅</div><div class="nav-label">Diário</div></div>
    </nav>

    <div id="shareModal">
        <div class="share-card" id="share-capture-area">
            <div id="map-share" class="share-map"></div>
            <div class="share-content">
                <h2 style="color:var(--accent-purple); margin-bottom:10px;">Corrida RunnerPro</h2>
                <div id="share-date" style="font-size:0.8rem; color:gray; margin-bottom:15px;"></div>
                <div class="stats-summary" style="text-align:left;">
                    <div class="stat-group"><span class="label">Distância</span><span class="value" id="share-dist">0.00</span> <span class="unit">km</span></div>
                    <div class="stat-group"><span class="label">Tempo</span><span class="value" id="share-time">00:00:00</span></div>
                </div>
            </div>
            <button class="btn-purple" style="margin:10px auto; display:block; width:90%;" onclick="closeShare()">Fechar</button>
        </div>
    </div>

    <script>
        let isRunning = false;
        let watchID, timerInterval, wakeLock = null;
        let distance = 0, seconds = 0, lastCoords = null;
        let currentPath = [];

        // Inicialização Mapas
        const mainMap = L.map('map-running', { zoomControl: false, attributionControl: false }).setView([0,0], 2);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(mainMap);
        let runPolyline = L.polyline([], { color: '#673ab7', weight: 6 }).addTo(mainMap);

        const shareMap = L.map('map-share', { zoomControl: false, attributionControl: false, dragging: false });
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(shareMap);
        let sharePolyline = L.polyline([], { color: '#673ab7', weight: 5 }).addTo(shareMap);

        function switchTab(tabId) {
            document.querySelectorAll('.app-shell').forEach(s => s.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            if(tabId === 'shell-run') setTimeout(() => mainMap.invalidateSize(), 200);
            renderDiary();
        }

        async function handleRunAction() {
            const btn = document.getElementById('mainBtn');
            if (!isRunning) {
                isRunning = true;
                distance = 0; seconds = 0; currentPath = [];
                runPolyline.setLatLngs([]);
                btn.innerText = "Parar e Salvar";
                btn.style.background = "var(--danger)";
                if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen');
                
                watchID = navigator.geolocation.watchPosition(pos => {
                    const { latitude: lat, longitude: lon, accuracy } = pos.coords;
                    if (accuracy > 30) return;
                    document.getElementById('gps-status').innerText = "📍 GPS ATIVO";
                    const point = [lat, lon];
                    if (lastCoords) {
                        const d = calcDist(lastCoords, {lat, lon});
                        if (d > 0.005) {
                            distance += d;
                            document.getElementById('run-dist').innerText = distance.toFixed(2);
                            currentPath.push(point);
                            runPolyline.addLatLng(point);
                            mainMap.fitBounds(runPolyline.getBounds());
                        }
                    } else { mainMap.setView(point, 17); currentPath.push(point); }
                    lastCoords = {lat, lon};
                }, null, { enableHighAccuracy: true });

                timerInterval = setInterval(() => {
                    seconds++;
                    const h = Math.floor(seconds/3600).toString().padStart(2,'0');
                    const m = Math.floor((seconds%3600)/60).toString().padStart(2,'0');
                    const s = (seconds%60).toString().padStart(2,'0');
                    document.getElementById('run-time').innerText = `${h}:${m}:${s}`;
                }, 1000);

            } else {
                isRunning = false;
                clearInterval(timerInterval);
                navigator.geolocation.clearWatch(watchID);
                if(wakeLock) wakeLock.release();
                if(distance > 0.01) saveRun(distance.toFixed(2), document.getElementById('run-time').innerText, currentPath);
                btn.innerText = "Iniciar Corrida";
                btn.style.background = "var(--accent-purple)";
                switchTab('shell-diary');
            }
        }

        function calcDist(l1, l2) {
            const R = 6371;
            const dLat = (l2.lat - l1.lat) * Math.PI / 180;
            const dLon = (l2.lon - l1.lon) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(l1.lat * Math.PI/180) * Math.cos(l2.lat * Math.PI/180) * Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function saveRun(dist, time, path) {
            const runs = JSON.parse(localStorage.getItem('runs_v3') || '[]');
            runs.unshift({ dist, time, path, date: new Date().toLocaleString('pt-BR') });
            localStorage.setItem('runs_v3', JSON.stringify(runs));
        }

        function renderDiary() {
            const runs = JSON.parse(localStorage.getItem('runs_v3') || '[]');
            const list = document.getElementById('activity-list');
            let totalD = 0;
            list.innerHTML = runs.length ? '' : '<p style="text-align:center; color:gray;">Nenhuma atividade recente.</p>';
            runs.forEach((r, i) => {
                totalD += parseFloat(r.dist);
                list.innerHTML += `
                    <div class="activity-item" onclick="openShare(${i})">
                        <div class="activity-icon">🏃</div>
                        <div class="activity-info">
                            <div class="activity-type">Corrida</div>
                            <div class="activity-date">${r.date}</div>
                        </div>
                        <div style="font-weight:800;">${r.dist} km</div>
                    </div>`;
            });
            document.getElementById('total-dist').innerText = totalD.toFixed(1);
            document.getElementById('total-acts').innerText = runs.length;
        }

        function openShare(index) {
            const run = JSON.parse(localStorage.getItem('runs_v3'))[index];
            document.getElementById('share-dist').innerText = run.dist;
            document.getElementById('share-time').innerText = run.time;
            document.getElementById('share-date').innerText = run.date;
            document.getElementById('shareModal').classList.add('active');
            
            sharePolyline.setLatLngs(run.path);
            setTimeout(() => {
                shareMap.invalidateSize();
                shareMap.fitBounds(sharePolyline.getBounds(), {padding:[20,20]});
            }, 300);
        }

        function closeShare() { document.getElementById('shareModal').classList.remove('active'); }

        window.onload = renderDiary;
    </script>
</body>
</html>
