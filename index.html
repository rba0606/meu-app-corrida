<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RunnerPro - Histórico</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root {
            --bg: #ffffff;
            --card: #f2f2f7;
            --text: #000000;
            --text-dim: #636366;
            --accent: #007aff;
            --highlight: linear-gradient(135deg, #d4fc79 0%, #96e6a1 100%);
            --danger: #ff3b30;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { background-color: var(--bg); color: var(--text); overflow-x: hidden; }

        .app-container { max-width: 430px; margin: 0 auto; padding: 20px 20px 100px; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        
        /* Cards */
        .card { background: var(--card); border-radius: 24px; padding: 20px; margin-bottom: 15px; border: 1px solid #e5e5ea; }
        .card-main { background: var(--highlight); border: none; }
        .label { font-size: 0.7rem; text-transform: uppercase; color: var(--text-dim); font-weight: 700; margin-bottom: 5px; display: block; }
        .big-value { font-size: 3.5rem; font-weight: 900; letter-spacing: -2px; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        #map { height: 180px; width: 100%; border-radius: 18px; z-index: 1; }

        /* Botões */
        .controls { position: fixed; bottom: 0; left: 0; width: 100%; padding: 20px; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); display: flex; gap: 10px; z-index: 10; }
        .btn { flex: 2; padding: 18px; border-radius: 16px; border: none; font-size: 1rem; font-weight: bold; cursor: pointer; }
        .btn-start { background: var(--accent); color: white; }
        .btn-stop { background: var(--danger); color: white; }
        .btn-sec { flex: 1; background: #e5e5ea; color: #000; }

        /* Modal de Histórico */
        #historyModal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 20; transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 20px; overflow-y: auto;
        }
        #historyModal.active { transform: translateY(0); }
        .history-item { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px; border-bottom: 1px solid #e5e5ea;
        }
        .close-history { float: right; font-weight: bold; color: var(--accent); margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <h1 style="font-weight: 800;">Correr</h1>
            <span id="gps-status" style="color:#248a3d; font-size: 0.8rem; font-weight: bold;">📍 GPS ON</span>
        </header>

        <div class="card card-main">
            <span class="label">Distância</span>
            <span class="big-value" id="dist">0.00</span><span style="font-weight: bold;"> km</span>
        </div>

        <div class="stats-grid">
            <div class="card">
                <span class="label">Tempo</span>
                <span id="time" style="font-size: 1.2rem; font-weight: 800;">00:00:00</span>
            </div>
            <div class="card">
                <span class="label">Pace Médio</span>
                <span id="pace" style="font-size: 1.2rem; font-weight: 800;">0'00"</span>
            </div>
        </div>

        <div class="card" style="padding: 8px;"><div id="map"></div></div>
    </div>

    <div id="historyModal">
        <span class="close-history" onclick="toggleHistory()">Fechar</span>
        <h2 style="margin-bottom: 20px;">Meu Histórico</h2>
        <div id="historyList">
            </div>
        <button onclick="clearHistory()" style="margin-top: 20px; color: red; border: none; background: none; font-size: 0.8rem;">Limpar Tudo</button>
    </div>

    <div class="controls">
        <button id="mainBtn" class="btn btn-start" onclick="handleAction()">Iniciar Corrida</button>
        <button class="btn btn-sec" onclick="toggleHistory()">Histórico</button>
    </div>

    <script>
        let isRunning = false;
        let watchID, timerInterval;
        let distance = 0, seconds = 0, lastCoords = null;

        // Mapa
        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([-23.5505, -46.6333], 16);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
        let polyline = L.polyline([], { color: '#007aff', weight: 6 }).addTo(map);

        function handleAction() {
            const btn = document.getElementById('mainBtn');
            if (!isRunning) {
                // Iniciar
                isRunning = true;
                distance = 0; seconds = 0;
                btn.innerText = "Parar e Salvar";
                btn.className = "btn btn-stop";
                startGPS();
                startTimer();
            } else {
                // Parar e Salvar
                saveRun(distance.toFixed(2), document.getElementById('time').innerText);
                location.reload(); 
            }
        }

        function startGPS() {
            watchID = navigator.geolocation.watchPosition((pos) => {
                const { latitude: lat, longitude: lon } = pos.coords;
                if (lastCoords) {
                    const d = calcDist(lastCoords, {lat, lon});
                    if (d > 0.002) { 
                        distance += d;
                        document.getElementById('dist').innerText = distance.toFixed(2);
                        polyline.addLatLng([lat, lon]);
                        map.panTo([lat, lon]);
                    }
                }
                lastCoords = {lat, lon};
            }, null, { enableHighAccuracy: true });
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                seconds++;
                const h = Math.floor(seconds / 3600).toString().padStart(2, '0');
                const m = Math.floor((seconds % 3600) / 60).toString().padStart(2, '0');
                const s = (seconds % 60).toString().padStart(2, '0');
                document.getElementById('time').innerText = `${h}:${m}:${s}`;
            }, 1000);
        }

        function calcDist(l1, l2) {
            const R = 6371;
            const dLat = (l2.lat - l1.lat) * Math.PI / 180;
            const dLon = (l2.lon - l1.lon) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(l1.lat * Math.PI/180) * Math.cos(l2.lat * Math.PI/180) * Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        // Lógica de Histórico
        function saveRun(dist, time) {
            if (parseFloat(dist) <= 0) return;
            const runs = JSON.parse(localStorage.getItem('runs') || '[]');
            const date = new Date().toLocaleDateString('pt-BR');
            runs.unshift({ dist, time, date });
            localStorage.setItem('runs', JSON.stringify(runs));
        }

        function toggleHistory() {
            const modal = document.getElementById('historyModal');
            modal.classList.toggle('active');
            if(modal.classList.contains('active')) renderHistory();
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            const runs = JSON.parse(localStorage.getItem('runs') || '[]');
            list.innerHTML = runs.length ? '' : '<p style="color:gray">Nenhuma corrida salva.</p>';
            runs.forEach(run => {
                list.innerHTML += `
                    <div class="history-item">
                        <div>
                            <div style="font-weight:800; font-size:1.1rem">${run.dist} km</div>
                            <div style="font-size:0.8rem; color:gray">${run.date}</div>
                        </div>
                        <div style="font-weight:bold">${run.time}</div>
                    </div>
                `;
            });
        }

        function clearHistory() {
            if(confirm("Apagar todas as corridas?")) {
                localStorage.removeItem('runs');
                renderHistory();
            }
        }
    </script>
</body>
</html>
