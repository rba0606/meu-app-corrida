<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RunnerPro - V2</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root {
            --bg: #ffffff;
            --card: #f2f2f7;
            --text: #000000;
            --text-dim: #636366;
            --accent: #007aff;
            --highlight: linear-gradient(135deg, #d4fc79 0%, #96e6a1 100%);
            --danger: #ff3b30;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { background-color: var(--bg); color: var(--text); overflow-x: hidden; }

        .app-container { max-width: 430px; margin: 0 auto; padding: 20px 20px 100px; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        
        .card { background: var(--card); border-radius: 24px; padding: 20px; margin-bottom: 15px; border: 1px solid #e5e5ea; }
        .card-main { background: var(--highlight); border: none; }
        .label { font-size: 0.7rem; text-transform: uppercase; color: var(--text-dim); font-weight: 700; margin-bottom: 5px; display: block; }
        .big-value { font-size: 3.5rem; font-weight: 900; letter-spacing: -2px; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        #map { height: 250px; width: 100%; border-radius: 18px; z-index: 1; }

        .controls { position: fixed; bottom: 0; left: 0; width: 100%; padding: 20px; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); display: flex; gap: 10px; z-index: 10; border-top: 1px solid #eee; }
        .btn { flex: 2; padding: 18px; border-radius: 16px; border: none; font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-start { background: var(--accent); color: white; }
        .btn-stop { background: var(--danger); color: white; }
        .btn-sec { flex: 1; background: #e5e5ea; color: #000; }

        /* Modal Histórico */
        #historyModal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 20; transform: translateY(100%);
            transition: transform 0.4s ease; padding: 20px; overflow-y: auto;
        }
        #historyModal.active { transform: translateY(0); }
        .history-item { 
            background: #f9f9f9; padding: 15px; border-radius: 15px; margin-bottom: 15px;
        }
        .mini-map-container { height: 120px; width: 100%; background: #eee; margin-top: 10px; border-radius: 10px; pointer-events: none; }
        .close-history { float: right; font-weight: bold; color: var(--accent); cursor: pointer; }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <h1 style="font-weight: 800;">RunnerPro</h1>
            <span id="gps-status" style="color:var(--text-dim); font-size: 0.8rem; font-weight: bold;">AGUARDANDO...</span>
        </header>

        <div class="card card-main">
            <span class="label">Distância</span>
            <span class="big-value" id="dist">0.00</span><span style="font-weight: bold;"> km</span>
        </div>

        <div class="stats-grid">
            <div class="card">
                <span class="label">Tempo</span>
                <span id="time" style="font-size: 1.2rem; font-weight: 800;">00:00:00</span>
            </div>
            <div class="card">
                <span class="label">Status</span>
                <span id="status-txt" style="font-size: 0.9rem; font-weight: 800;">Pronto</span>
            </div>
        </div>

        <div class="card" style="padding: 8px;"><div id="map"></div></div>
    </div>

    <div id="historyModal">
        <span class="close-history" onclick="toggleHistory()">Fechar</span>
        <h2 style="margin-bottom: 20px;">Atividades Recentes</h2>
        <div id="historyList"></div>
        <button onclick="clearHistory()" style="margin: 40px auto; display: block; color: red; border: none; background: none;">Limpar Tudo</button>
    </div>

    <div class="controls">
        <button id="mainBtn" class="btn btn-start" onclick="handleAction()">Iniciar Corrida</button>
        <button class="btn btn-sec" onclick="toggleHistory()">Histórico</button>
    </div>

    <script>
        let isRunning = false;
        let watchID, timerInterval, wakeLock = null;
        let distance = 0, seconds = 0, lastCoords = null;
        let currentPath = []; // Para salvar as coordenadas

        // Inicializar Mapa principal
        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([0,0], 2);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
        let polyline = L.polyline([], { color: '#007aff', weight: 6 }).addTo(map);

        // Manter a tela ligada
        async function toggleWakeLock(active) {
            if (active && 'wakeLock' in navigator) {
                try { wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
            } else if (wakeLock) {
                wakeLock.release();
                wakeLock = null;
            }
        }

        function handleAction() {
            const btn = document.getElementById('mainBtn');
            if (!isRunning) {
                startRace(btn);
            } else {
                stopRace(btn);
            }
        }

        function startRace(btn) {
            isRunning = true;
            distance = 0; seconds = 0; currentPath = [];
            document.getElementById('dist').innerText = "0.00";
            polyline.setLatLngs([]);
            
            btn.innerText = "Parar e Salvar";
            btn.className = "btn btn-stop";
            document.getElementById('status-txt').innerText = "Correndo...";
            
            toggleWakeLock(true);
            startGPS();
            startTimer();
        }

        function stopRace(btn) {
            isRunning = false;
            navigator.geolocation.clearWatch(watchID);
            clearInterval(timerInterval);
            toggleWakeLock(false);
            
            saveRun(distance.toFixed(2), document.getElementById('time').innerText, currentPath);
            
            btn.innerText = "Iniciar Corrida";
            btn.className = "btn btn-start";
            document.getElementById('status-txt').innerText = "Salvo!";
            alert("Corrida salva com sucesso!");
        }

        function startGPS() {
            watchID = navigator.geolocation.watchPosition((pos) => {
                const { latitude: lat, longitude: lon, accuracy } = pos.coords;
                
                // Ignora pontos com precisão ruim (mais de 30 metros)
                if (accuracy > 30) return;

                document.getElementById('gps-status').innerText = "📍 SINAL FORTE";

                const newPoint = [lat, lon];
                if (lastCoords) {
                    const d = calcDist(lastCoords, {lat, lon});
                    if (d > 0.005) { // Filtro de 5 metros para evitar "tremedeira" do GPS
                        distance += d;
                        document.getElementById('dist').innerText = distance.toFixed(2);
                        currentPath.push(newPoint);
                        polyline.addLatLng(newPoint);
                        map.fitBounds(polyline.getBounds());
                    }
                } else {
                    currentPath.push(newPoint);
                    map.setView(newPoint, 17);
                }
                lastCoords = {lat, lon};
            }, (err) => {
                document.getElementById('gps-status').innerText = "❌ ERRO GPS";
            }, { enableHighAccuracy: true });
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                seconds++;
                const h = Math.floor(seconds / 3600).toString().padStart(2, '0');
                const m = Math.floor((seconds % 3600) / 60).toString().padStart(2, '0');
                const s = (seconds % 60).toString().padStart(2, '0');
                document.getElementById('time').innerText = `${h}:${m}:${s}`;
            }, 1000);
        }

        function calcDist(l1, l2) {
            const R = 6371;
            const dLat = (l2.lat - l1.lat) * Math.PI / 180;
            const dLon = (l2.lon - l1.lon) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(l1.lat * Math.PI/180) * Math.cos(l2.lat * Math.PI/180) * Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function saveRun(dist, time, path) {
            if (parseFloat(dist) < 0.01) return;
            const runs = JSON.parse(localStorage.getItem('runs') || '[]');
            const date = new Date().toLocaleDateString('pt-BR', {day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit'});
            runs.unshift({ dist, time, date, path });
            localStorage.setItem('runs', JSON.stringify(runs));
        }

        function toggleHistory() {
            const modal = document.getElementById('historyModal');
            modal.classList.toggle('active');
            if(modal.classList.contains('active')) renderHistory();
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            const runs = JSON.parse(localStorage.getItem('runs') || '[]');
            list.innerHTML = runs.length ? '' : '<p style="text-align:center; padding:20px;">Nenhuma corrida salva.</p>';
            
            runs.forEach((run, index) => {
                const itemID = `map-mini-${index}`;
                list.innerHTML += `
                    <div class="history-item">
                        <div style="display:flex; justify-content:space-between; align-items:center">
                            <div>
                                <div style="font-weight:800; font-size:1.2rem">${run.dist} km</div>
                                <div style="font-size:0.75rem; color:gray">${run.date}</div>
                            </div>
                            <div style="font-weight:bold; color:var(--accent)">${run.time}</div>
                        </div>
                        <div id="${itemID}" class="mini-map-container"></div>
                    </div>
                `;
                // Renderizar o mini mapa após o HTML ser inserido
                setTimeout(() => {
                    if (run.path && run.path.length > 0) {
                        const miniMap = L.map(itemID, {zoomControl: false, attributionControl: false, dragging: false, scrollWheelZoom: false});
                        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(miniMap);
                        const p = L.polyline(run.path, {color: '#007aff', weight: 4}).addTo(miniMap);
                        miniMap.fitBounds(p.getBounds(), {padding: [10, 10]});
                    }
                }, 100);
            });
        }

        function clearHistory() {
            if(confirm("Deseja apagar todo o histórico?")) {
                localStorage.removeItem('runs');
                renderHistory();
            }
        }
    </script>
</body>
</html>
