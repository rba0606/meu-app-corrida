<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RunnerPro - Tracker de Corrida</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/5234/5234158.png">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg: #ffffff;      /* Fundo Branco */
            --card: #f2f2f7;    /* Cards num cinza bem leve para destaque */
            --text: #000000;    /* Texto Preto */
            --text-dim: #636366; 
            --accent: #007aff;
            --highlight: linear-gradient(135deg, #d4fc79 0%, #96e6a1 100%);
            --danger: #ff3b30;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: var(--bg); color: var(--text); overflow-x: hidden; }

        .app-container { max-width: 430px; margin: 0 auto; padding: 20px 20px 100px; }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .gps-status { font-size: 0.8rem; font-weight: bold; color: #248a3d; }

        /* Estilo dos Cards */
        .card { background: var(--card); border-radius: 24px; padding: 20px; margin-bottom: 15px; border: 1px solid #e5e5ea; }
        .card-main { background: var(--highlight); color: #000; border: none; box-shadow: 0 10px 20px rgba(150, 230, 161, 0.3); }
        
        .label { font-size: 0.75rem; text-transform: uppercase; color: var(--text-dim); margin-bottom: 5px; font-weight: 600; display: block; }
        .card-main .label { color: rgba(0,0,0,0.6); }

        .big-value { font-size: 3.8rem; font-weight: 900; display: inline-block; letter-spacing: -2px; }
        .unit { font-size: 1.2rem; font-weight: 700; margin-left: 5px; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .stat-card { text-align: center; padding: 15px 5px; }
        .stat-val { font-size: 1.2rem; font-weight: 800; display: block; }

        /* Mapa */
        #map { height: 220px; width: 100%; border-radius: 20px; margin-top: 10px; z-index: 1; border: 1px solid #e5e5ea; }
        .chart-box { height: 50px; margin-top: 10px; opacity: 0.6; }

        /* Botões */
        .controls { position: fixed; bottom: 0; left: 0; width: 100%; padding: 20px; background: rgba(255,255,255,0.8); backdrop-filter: blur(10px); display: flex; gap: 10px; z-index: 10; }
        .btn { flex: 2; padding: 20px; border-radius: 18px; border: none; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn:active { transform: scale(0.96); }
        .btn-start { background: var(--accent); color: white; }
        .btn-stop { background: var(--danger); color: white; }
        .btn-sec { flex: 1; background: #e5e5ea; color: #000; }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <h1 style="font-weight: 800;">Atividade</h1>
            <span class="gps-status" id="gps-status">📍 GPS ATIVO</span>
        </header>

        <div class="card card-main">
            <span class="label">Distância Total</span>
            <div>
                <span class="big-value" id="dist">0.00</span>
                <span class="unit">km</span>
            </div>
            <div class="chart-box">
                <canvas id="miniChart"></canvas>
            </div>
        </div>

        <div class="stats-grid">
            <div class="card stat-card">
                <span class="label">Tempo</span>
                <span class="stat-val" id="time">00:00:00</span>
            </div>
            <div class="card stat-card">
                <span class="label">Ritmo</span>
                <span class="stat-val" id="pace">0'00"</span>
            </div>
            <div class="card stat-card">
                <span class="label">Kcal</span>
                <span class="stat-val">0</span>
            </div>
        </div>

        <div class="card" style="padding: 8px;">
            <div id="map"></div>
        </div>
    </div>

    <div class="controls">
        <button id="mainBtn" class="btn btn-start">Iniciar Corrida</button>
        <button class="btn btn-sec">Histórico</button>
    </div>

    <script>
        let isRunning = false;
        let watchID, timerInterval;
        let distance = 0, seconds = 0, lastCoords = null, path = [];

        // Inicializar Mapa com tema claro (Voyager)
        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([-23.5505, -46.6333], 16);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
        let polyline = L.polyline([], { color: '#007aff', weight: 6, opacity: 0.8 }).addTo(map);

        const ctx = document.getElementById('miniChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: { labels: ['', '', '', '', ''], datasets: [{ data: [0,0,0,0,0], borderColor: 'rgba(0,0,0,0.1)', tension: 0.4, pointRadius: 0, fill: true, backgroundColor: 'rgba(0,0,0,0.05)' }] },
            options: { responsive: true, maintainAspectRatio: false, scales: { x: {display: false}, y: {display: false} }, plugins: {legend: {display: false}} }
        });

        function calcDist(l1, l2) {
            const R = 6371;
            const dLat = (l2.lat - l1.lat) * Math.PI / 180;
            const dLon = (l2.lon - l1.lon) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(l1.lat * Math.PI/180) * Math.cos(l2.lat * Math.PI/180) * Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function updateGPS(pos) {
            const { latitude: lat, longitude: lon } = pos.coords;
            if (lastCoords) {
                const d = calcDist(lastCoords, {lat, lon});
                if (d > 0.002) { 
                    distance += d;
                    document.getElementById('dist').innerText = distance.toFixed(2);
                    path.push([lat, lon]);
                    polyline.setLatLngs(path);
                    map.panTo([lat, lon]);
                }
            }
            lastCoords = {lat, lon};
        }

        document.getElementById('mainBtn').addEventListener('click', function() {
            if (!isRunning) {
                isRunning = true;
                this.innerText = "Parar";
                this.className = "btn btn-stop";
                watchID = navigator.geolocation.watchPosition(updateGPS, null, { enableHighAccuracy: true });
                timerInterval = setInterval(() => {
                    seconds++;
                    const h = Math.floor(seconds / 3600).toString().padStart(2, '0');
                    const m = Math.floor((seconds % 3600) / 60).toString().padStart(2, '0');
                    const s = (seconds % 60).toString().padStart(2, '0');
                    document.getElementById('time').innerText = `${h}:${m}:${s}`;
                }, 1000);
            } else {
                location.reload(); 
            }
        });
    </script>
</body>
</html>
